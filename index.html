<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos - Hamburguesería</title>
<style>
    :root {
        --negro: #1a1410;
        --negro-suave: #241c17;
        --rojo: #e6342a;
        --rojo-oscuro: #b8241c;
        --dorado: #f0b429;
        --crema: #f5e9d3;
        --verde: #2e9e4f;
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background: var(--negro);
        background-image:
            radial-gradient(circle at 20% 10%, rgba(230, 52, 42, 0.12), transparent 40%),
            radial-gradient(circle at 80% 0%, rgba(240, 180, 41, 0.10), transparent 35%);
        color: var(--crema);
        padding-bottom: 40px;
    }

    /* ---------- HEADER ---------- */
    header {
        background: linear-gradient(135deg, var(--rojo-oscuro), var(--rojo));
        padding: 28px 20px 24px;
        text-align: center;
        box-shadow: 0 4px 18px rgba(0,0,0,0.5);
        border-bottom: 4px solid var(--dorado);
        position: relative;
    }

    header h1 {
        margin: 0;
        font-size: 2.2em;
        letter-spacing: 2px;
        color: var(--crema);
        text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
        text-transform: uppercase;
    }

    header .subtitulo {
        margin: 6px 0 0;
        color: var(--dorado);
        font-weight: bold;
        letter-spacing: 1px;
        font-size: 0.95em;
    }

    .aviso {
        max-width: 900px;
        margin: 16px auto 0;
        text-align: center;
        font-size: 0.85em;
        color: #cbbfa9;
        padding: 0 20px;
    }

    main {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
    }

    .seccion-titulo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 35px 0 18px;
    }

    .seccion-titulo h2 {
        color: var(--dorado);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-size: 1.3em;
        margin: 0;
        white-space: nowrap;
    }

    .seccion-titulo::after {
        content: "";
        flex: 1;
        height: 2px;
        background: linear-gradient(to right, var(--dorado), transparent);
    }

    /* ---------- TABS (Hamburguesas / Promos) ---------- */
    .tabs {
        display: flex;
        gap: 10px;
        margin: 35px 0 18px;
        border-bottom: 2px solid #3a2f26;
    }

    .tab-btn {
        background: transparent;
        color: #c9bca5;
        border: none;
        border-bottom: 3px solid transparent;
        border-radius: 0;
        padding: 12px 6px;
        font-size: 1.05em;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: bold;
    }

    .tab-btn:hover {
        background: transparent;
        color: var(--crema);
        transform: none;
    }

    .tab-btn.activo {
        color: var(--dorado);
        border-bottom-color: var(--dorado);
    }

    .tab-panel {
        display: none;
    }

    .tab-panel.activo {
        display: block;
    }

    /* ---------- PROMOS ---------- */
    .promo-elecciones {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 10px;
    }

    .promo-burger {
        background: #211a13;
        border: 1px solid #3a2f26;
        border-radius: 8px;
        padding: 10px 12px;
    }

    .promo-burger .label-campo {
        margin-bottom: 6px;
        color: var(--dorado);
    }

    /* ---------- PRODUCTOS ---------- */
    .producto {
        background: var(--negro-suave);
        border: 1px solid #3a2f26;
        border-left: 5px solid var(--rojo);
        border-radius: 12px;
        padding: 18px 20px;
        margin: 14px 0;
        box-shadow: 0 3px 10px rgba(0,0,0,0.35);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .producto:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(0,0,0,0.5);
    }

    .producto h3 {
        margin: 0 0 6px;
        color: var(--crema);
        font-size: 1.25em;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .producto p.desc {
        margin: 0 0 12px;
        color: #c9bca5;
        font-size: 0.92em;
        line-height: 1.4;
    }

    .producto .precio-base {
        color: var(--dorado);
        font-weight: bold;
        font-size: 0.85em;
        display: block;
        margin-bottom: 10px;
    }

    .fila-controles {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: stretch;
    }

    select, input[type="text"] {
        background: #2d2419;
        border: 1px solid #4a3c2c;
        color: var(--crema);
        padding: 9px 12px;
        border-radius: 8px;
        font-size: 0.95em;
        flex: 1;
        min-width: 140px;
    }

    select:focus, input[type="text"]:focus {
        outline: none;
        border-color: var(--dorado);
    }

    button {
        cursor: pointer;
        background: var(--verde);
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        font-weight: bold;
        letter-spacing: 0.5px;
        font-size: 0.9em;
        transition: background 0.15s ease, transform 0.1s ease;
    }

    button:hover {
        background: #259144;
        transform: translateY(-1px);
    }

    button:active {
        transform: translateY(0);
    }

    .btn-agregar {
        width: 100%;
        margin-top: 10px;
    }

    .producto.extra {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        border-left: 5px solid var(--dorado);
    }

    .producto.extra span {
        font-weight: bold;
        color: var(--crema);
    }

    /* ---------- CARRITO ---------- */
    #carrito {
        position: sticky;
        top: 15px;
        background: linear-gradient(160deg, #221a14, #150f0b);
        color: var(--crema);
        padding: 20px;
        border-radius: 14px;
        border: 2px solid var(--dorado);
        box-shadow: 0 6px 20px rgba(0,0,0,0.55);
        margin: 30px 0;
        z-index: 10;
    }

    .carrito-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-bottom: 1px solid #4a3c2c;
        padding-bottom: 10px;
        margin-bottom: 12px;
    }

    #carrito h2 {
        margin: 0;
        color: var(--dorado);
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 1.2em;
    }

    .btn-vaciar {
        background: transparent;
        border: 1px solid var(--rojo);
        color: var(--rojo);
        padding: 6px 12px;
        font-size: 0.78em;
        border-radius: 6px;
    }

    .btn-vaciar:hover {
        background: var(--rojo);
        color: var(--crema);
    }

    #listaPedido {
        list-style: none;
        padding: 0;
        margin: 0 0 12px;
        max-height: 220px;
        overflow-y: auto;
    }

    #listaPedido li {
        padding: 8px 0;
        border-bottom: 1px dashed #3a2f26;
        font-size: 0.92em;
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    #listaPedido li:last-child {
        border-bottom: none;
    }

    #listaPedido .nombre-item {
        color: var(--crema);
    }

    #listaPedido .precio-item {
        color: var(--dorado);
        font-weight: bold;
        white-space: nowrap;
    }

    #listaPedido .item-info {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        min-width: 0;
    }

    #listaPedido .item-info span.nombre-item {
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .btn-quitar {
        background: transparent;
        border: 1px solid #6e5f4c;
        color: #c9bca5;
        width: 24px;
        height: 24px;
        min-width: 24px;
        padding: 0;
        border-radius: 50%;
        font-size: 0.75em;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .btn-quitar:hover {
        background: var(--rojo);
        border-color: var(--rojo);
        color: white;
        transform: none;
    }

    #listaPedido:empty::before {
        content: "Todavía no agregaste nada 🍔";
        color: #8a7a64;
        font-style: italic;
        font-size: 0.9em;
    }

    .total-fila {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 1.15em;
        font-weight: bold;
        margin: 10px 0 16px;
        padding-top: 8px;
    }

    .total-fila span#total {
        color: var(--dorado);
        font-size: 1.3em;
    }

    #carrito input[type="text"] {
        width: 100%;
        margin-bottom: 10px;
    }

    .label-campo {
        display: block;
        font-size: 0.8em;
        color: #c9bca5;
        margin-bottom: 5px;
        font-weight: bold;
    }

    #carrito select {
        width: 100%;
        margin-bottom: 10px;
    }

    .btn-whatsapp {
        background: #25D366;
        width: 100%;
        font-size: 1em;
        padding: 13px;
        border-radius: 10px;
        text-transform: uppercase;
        box-shadow: 0 3px 10px rgba(37, 211, 102, 0.35);
    }

    .btn-whatsapp:hover {
        background: #1ebe57;
    }

    footer {
        text-align: center;
        color: #6e5f4c;
        font-size: 0.8em;
        margin-top: 40px;
        padding: 0 20px;
        letter-spacing: 0.5px;
    }

    footer strong {
        color: var(--dorado);
    }

    @media (max-width: 600px) {
        header h1 { font-size: 1.6em; }
        .fila-controles { flex-direction: column; }
        select, input[type="text"] { min-width: 100%; }
    }
</style>
</head>
<body>

<header>
    <h1>🔥 CHE! Burger 🔥</h1>
    <p class="subtitulo"></p>
</header>

<p class="aviso">*Todas las burgers y promos incluyen papas fritas.</p>

<main>
    <div class="tabs">
        <button class="tab-btn activo" id="tab-burgers" onclick="cambiarTab('burgers')">🍔 Hamburguesas</button>
        <button class="tab-btn" id="tab-promos" onclick="cambiarTab('promos')">🔥 Promos</button>
    </div>

    <div id="panel-burgers" class="tab-panel activo">
        <div id="menu"></div>
    </div>

    <div id="panel-promos" class="tab-panel">
        <div id="promos"></div>
    </div>

    <div class="seccion-titulo"><h2>🧀 Extras</h2></div>
    <div id="extras">
        <div class="producto extra">
            <span>Dip Cheddar ($2500)</span>
            <button onclick="agregarExtra('Dip Cheddar', 2500)">Agregar</button>
        </div>
        <div class="producto extra">
            <span>Bandeja de Papas con Cheddar y Panceta ($3000)</span>
            <button onclick="agregarExtra('Bandeja de Papas con Cheddar y Panceta', 3000)">Agregar</button>
        </div>
    </div>

    <div id="carrito">
        <div class="carrito-header">
            <h2>🛒 Tu Pedido</h2>
            <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar</button>
        </div>
        <ul id="listaPedido"></ul>
        <div class="total-fila">
            <span>Total:</span>
            <span>$<span id="total">0</span></span>
        </div>
        <input type="text" id="nombreCliente" placeholder="Tu nombre">
        <input type="text" id="direccionCliente" placeholder="Dirección de envío">
        <span class="label-campo">¿Cómo vas a pagar?</span>
        <select id="metodoPago">
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia">Transferencia</option>
        </select>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">📲 Pedir por WhatsApp</button>
    </div>
</main>

<footer>
    <strong>CHE! Burger</strong> · Hecho con 🔥 para los que aman las burgers de verdad
</footer>

<script>
    const menu = [
        { nombre: "LA ORIGINAL", desc: "Cheddar doble" },
        { nombre: "LA POSTA", desc: "Cebolla fresca, cheddar, kepchup, mostaza" },
        { nombre: "LA FIJA", desc: "Cheddar, huevo, panceta, cebolla grillada, salsa barbacoa" },
        { nombre: "LA BESTIA", desc: "Cheddar panceta, cebolla crispy, huevo, salsa stacker" },
        { nombre: "LA CRIOLLA", desc: "Cheddar, lechuga, tomate, cebolla fresca, salsa tasty" }
    ];

    const precios = { "Simple": 6500, "Doble": 8200, "Triple": 9500, "Cuádruple": 11500 };

    const promos = [
        { id: "promo-doble", nombre: "PROMO 2 DOBLES", desc: "Elegí 2 hamburguesas dobles", precio: 15500 },
        { id: "promo-triple", nombre: "PROMO 2 TRIPLES", desc: "Elegí 2 hamburguesas triples", precio: 18000 },
        { id: "promo-cuadruple", nombre: "PROMO 2 CUÁDRUPLES", desc: "Elegí 2 hamburguesas cuádruples", precio: 22000 }
    ];

    let carrito = [];
    let total = 0;

    function cambiarTab(tab) {
        document.getElementById('tab-burgers').classList.toggle('activo', tab === 'burgers');
        document.getElementById('tab-promos').classList.toggle('activo', tab === 'promos');
        document.getElementById('panel-burgers').classList.toggle('activo', tab === 'burgers');
        document.getElementById('panel-promos').classList.toggle('activo', tab === 'promos');
    }

    function renderMenu() {
        const container = document.getElementById('menu');
        menu.forEach(item => {
            container.innerHTML += `
                <div class="producto">
                    <h3>${item.nombre}</h3>
                    <p class="desc">${item.desc}</p>
                    <span class="precio-base">Desde $6500</span>
                    <div class="fila-controles">
                        <select id="sel-${item.nombre}">
                            <option value="Simple">Simple ($6500)</option>
                            <option value="Doble">Doble ($8200)</option>
                            <option value="Triple">Triple ($9500)</option>
                            <option value="Cuádruple">Cuádruple ($11500)</option>
                        </select>
                        <input type="text" id="mod-${item.nombre}" placeholder="¿Sacar algo?">
                    </div>
                    <button class="btn-agregar" onclick="agregar('${item.nombre}')">Agregar al carrito</button>
                </div>
            `;
        });
    }

    function renderPromos() {
        const container = document.getElementById('promos');
        promos.forEach(promo => {
            const opcionesBurgers = menu.map(item => `<option value="${item.nombre}">${item.nombre}</option>`).join('');
            container.innerHTML += `
                <div class="producto">
                    <h3>${promo.nombre}</h3>
                    <p class="desc">${promo.desc}</p>
                    <span class="precio-base">$${promo.precio}</span>
                    <div class="promo-elecciones">
                        <div class="promo-burger">
                            <span class="label-campo">Hamburguesa 1</span>
                            <div class="fila-controles">
                                <select id="${promo.id}-burger1">${opcionesBurgers}</select>
                                <input type="text" id="${promo.id}-mod1" placeholder="¿Sacar algo?">
                            </div>
                        </div>
                        <div class="promo-burger">
                            <span class="label-campo">Hamburguesa 2</span>
                            <div class="fila-controles">
                                <select id="${promo.id}-burger2">${opcionesBurgers}</select>
                                <input type="text" id="${promo.id}-mod2" placeholder="¿Sacar algo?">
                            </div>
                        </div>
                    </div>
                    <button class="btn-agregar" onclick="agregarPromo('${promo.id}')">Agregar al carrito</button>
                </div>
            `;
        });
    }

    function agregarPromo(promoId) {
        const promo = promos.find(p => p.id === promoId);
        const burger1 = document.getElementById(`${promoId}-burger1`).value;
        const mod1 = document.getElementById(`${promoId}-mod1`).value;
        const burger2 = document.getElementById(`${promoId}-burger2`).value;
        const mod2 = document.getElementById(`${promoId}-mod2`).value;

        const detalle = `${burger1}${mod1 ? ' (Sin: ' + mod1 + ')' : ''} + ${burger2}${mod2 ? ' (Sin: ' + mod2 + ')' : ''}`;

        carrito.push({ nombre: promo.nombre, carne: '', mods: detalle, precio: promo.precio, esPromo: true });
        total += promo.precio;

        actualizarUI();
    }

    function agregar(nombre) {
        const carne = document.getElementById(`sel-${nombre}`).value;
        const mods = document.getElementById(`mod-${nombre}`).value;
        const precio = precios[carne];

        carrito.push({ nombre, carne, mods, precio });
        total += precio;

        actualizarUI();
    }

    function agregarExtra(nombre, precio) {
        carrito.push({ nombre, carne: '', mods: '', precio });
        total += precio;
        actualizarUI();
    }

    function actualizarUI() {
        const lista = document.getElementById('listaPedido');
        lista.innerHTML = carrito.map((i, idx) => `
            <li>
                <span class="item-info">
                    <button class="btn-quitar" onclick="quitarItem(${idx})" title="Quitar">✕</button>
                    <span class="nombre-item">${i.nombre} ${i.carne} ${i.esPromo ? '— ' + i.mods : (i.mods ? '(' + i.mods + ')' : '')}</span>
                </span>
                <span class="precio-item">$${i.precio}</span>
            </li>
        `).join('');
        document.getElementById('total').textContent = total;
    }

    function quitarItem(idx) {
        total -= carrito[idx].precio;
        carrito.splice(idx, 1);
        actualizarUI();
    }

    function vaciarCarrito() {
        carrito = [];
        total = 0;
        actualizarUI();
    }

    function enviarWhatsApp() {
        const nombre = document.getElementById('nombreCliente').value;
        const direccion = document.getElementById('direccionCliente').value;
        const metodoPago = document.getElementById('metodoPago').value;
        let mensaje = `Hola, soy ${nombre}. Mi pedido:\n`;
        carrito.forEach(i => mensaje += `- ${i.nombre} ${i.carne} ${i.esPromo ? '(' + i.mods + ')' : (i.mods ? '(Sin: ' + i.mods + ')' : '')}\n`);
        mensaje += `\nDirección de envío: ${direccion}`;
        mensaje += `\nMétodo de pago: ${metodoPago}`;
        mensaje += `\nTotal: $${total}`;

        window.open(`https://wa.me/5493425965661?text=${encodeURIComponent(mensaje)}`);
    }

    renderMenu();
    renderPromos();
</script>

</body>
</html>
